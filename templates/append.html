<!DOCTYPE html>
<html>
<head>
<style>
body{
margin:0;
font-family:serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:20px;
font-size:30px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

.container{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.form-card{
background:rgba(255,255,255,0.9);
color:black;
border-radius:20px;
padding:30px;
box-shadow:0 0 15px rgba(212,175,55,0.3);
max-width:400px;
width:100%;
}

.form-card h2{
text-align:center;
margin-bottom:20px;
color:#D4AF37;
}

.form-card label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

.form-card input, .form-card select{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

.form-card button{
width:100%;
padding:12px;
background:#D4AF37;
color:black;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.form-card button:hover{
background:#B8860B;
}

</style>
</head>

<body>

<header>🥂 The Premium Spirit</header>

<div class="container">
<div class="form-card">
<h2>เพิ่มสินค้า</h2>

<form method="post">

<label for="name">ชื่อสินค้า</label>
<input id="name" name="name" placeholder="ชื่อ" required><br>

<label for="price">ราคา (บาท)</label>
<input id="price" name="price" placeholder="ราคา" type="number" step="0.01" required><br>

<label for="image">URL รูปภาพ</label>
<input id="image" name="image" placeholder="URL รูป" required><br>

<label for="stock">คงเหลือ (จำนวน)</label>
<input id="stock" name="stock" placeholder="สต็อก" type="number" required><br>

<label for="alcohol">ปริมาณแอลกอฮอล์ (%)</label>
<input id="alcohol" name="alcohol" placeholder="% แอลกอฮอล์" type="number" step="0.1" required><br>

<label for="volume">ปริมาตร (ml)</label>
<input id="volume" name="volume" placeholder="ml" type="number" required><br>

<label for="category">หมวดหมู่</label>
<select id="category" name="category" required>
{% for c in categories %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}
</select>

<br><br>
<button>บันทึก</button>

</form>
</div>
</div>

</body>
</html>
